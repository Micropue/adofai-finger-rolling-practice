<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Dance of Fire and Ice 轮指练习器</title>
    <link rel="shortcut icon" href="./logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire-gradient: linear-gradient(135deg, #ff416c, #ff4b2b);
            --ice-gradient: linear-gradient(135deg, #00d2ff, #3a7bd5);
            --bg-color: #0f0c29;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0a192f, #112240);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .logo img {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .logo h1 {
            margin-left: 20px;
            font-size: 1.8rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ff4b2b, #00d2ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kps-container {
            margin: 20px 0;
        }

        .kps {
            font-size: 3rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transition: all 0.1s ease;
        }

        .kps.pulse {
            transform: scale(1.1);
            color: #ff9f43;
        }

        .keyviewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        .controls {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .bpm-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        .bpm-controls input {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 60px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            outline: none;
            transition: border-color 0.3s;
        }

        .bpm-controls input:focus {
            border-color: #00d2ff;
        }

        .btn-metronome {
            background: var(--ice-gradient);
            padding: 8px 20px;
            font-size: 0.9rem;
        }

        .btn-metronome.active {
            background: var(--fire-gradient);
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.5);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 0 10px;
        }

        .set-key {
            background: var(--fire-gradient);
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
        }

        .cancel-key {
            background: var(--ice-gradient);
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }

        button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        .keyboard-view {
            display: flex;
            align-items: flex-end;
            height: 350px;
            /* Reduced for better layout */
            gap: 15px;
            padding: 20px;
        }

        .key {
            width: 70px;
            height: 70px;
            border: 2px solid var(--glass-border);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.1s ease;
        }

        .key.fire {
            border-color: rgba(255, 75, 43, 0.5);
            color: #ff4b2b;
        }

        .key.ice {
            border-color: rgba(0, 210, 255, 0.5);
            color: #00d2ff;
        }

        .key.active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.1);
        }

        .key.fire.active {
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.6);
        }

        .key.ice.active {
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }

        .rain {
            position: absolute;
            width: 100%;
            bottom: calc(100% + 10px);
            border-radius: 8px;
            opacity: 0.8;
            filter: blur(1px);
        }

        .fire-rain {
            background: var(--fire-gradient);
            box-shadow: 0 0 10px rgba(255, 75, 43, 0.5);
        }

        .ice-rain {
            background: var(--ice-gradient);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .clickview {
            height: 40px;
            background: rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            border-radius: 10px;
            display: flex;
            padding: 5px;
            overflow: hidden;
            justify-content: flex-end;
            border: 1px solid var(--glass-border);
        }

        .cl {
            width: 6px;
            height: 100%;
            border-radius: 10px;
            margin: 0 2px;
            flex-shrink: 0;
        }

        .cl-fire {
            background: var(--fire-gradient);
        }

        .cl-ice {
            background: var(--ice-gradient);
        }

        .cl-perfect {
            background: white;
            box-shadow: 0 0 10px white;
            opacity: 0.5;
            width: 8px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="logo">
            <img src="./logo.png" alt="logo">
            <h1>A Dance of Fire and Ice</h1>
        </div>
        <div class="kps-container">
            <div class="kps">KPS: 0</div>
        </div>
        <div class="keyviewer">
            <div class="controls">
                <div class="bpm-controls">
                    <label for="bpm-input">BPM:</label>
                    <input type="number" id="bpm-input" value="120" min="1" max="999">
                    <label for="vol-input" style="margin-left: 10px;">音量 / Vol:</label>
                    <input type="range" id="vol-input" value="1.0" min="0" max="2" step="0.1" style="width: 80px; vertical-align: middle;">
                    <button class="btn-metronome">开启节拍器 / Start Metronome</button>
                </div>
                <div class="button-group">
                    <button class="set-key">设置键位 / Set Keys</button>
                    <button class="cancel-key" style="display: none;">设置完成 / Done</button>
                </div>
            </div>
            <div class="keyboard-view">
                <!-- Keys will be injected here -->
            </div>
        </div>
        <div class="clickview">
            <!-- Hits will be injected here -->
        </div>
    </div>
    <script>
        const setKeyButton = document.querySelector(".set-key")
        const cancelKeyButton = document.querySelector(".cancel-key")
        const keyboardView = document.querySelector(".keyboard-view")
        const clickview = document.querySelector(".clickview")
        const kps = document.querySelector(".kps")

        // Initialize keys from localStorage
        let keys = []
        try {
            const saved = localStorage.getItem("keys")
            keys = saved ? saved.split(",") : []
        } catch (e) {
            keys = []
        }

        keys.forEach((key, index) => putToDom(key, index))

        function putToDom(key, index) {
            const ele = document.createElement("div")
            ele.innerText = key.toUpperCase()
            // Alternate between fire and ice classes
            const type = index % 2 === 0 ? 'fire' : 'ice'
            ele.className = `key ${type}`
            keyboardView.append(ele)
        }

        function collectKeys() {
            const abortController = new AbortController()
            window.addEventListener("keydown", e => {
                // Prevent duplicate keys and limit to 8
                if (keys.length >= 8 || keys.includes(e.key)) return
                keys.push(e.key)
                putToDom(e.key, keys.length - 1)
                localStorage.setItem("keys", keys.join(","))
            }, {
                signal: abortController.signal
            })
            return abortController
        }

        setKeyButton.onclick = () => {
            setKeyButton.style.display = 'none'
            cancelKeyButton.style.display = 'inline-block'
            keyboardView.innerHTML = "";
            keys = []
            const abort = collectKeys()
            cancelKeyButton.onclick = () => {
                setKeyButton.style.display = 'inline-block'
                cancelKeyButton.style.display = 'none'
                abort.abort()
            }
        }

        const ev = new Map()
        let pressTimestamps = []

        window.addEventListener("keydown", e => {
            const keyEles = document.querySelectorAll(".key")
            keyEles.forEach((i, index) => {
                if (i.innerText.toLowerCase() !== e.key.toLowerCase() || i.classList.contains("active")) return

                const isFire = i.classList.contains("fire")
                const typeClass = isFire ? "fire" : "ice"

                i.classList.add("active")

                // KPS Pulse effect
                kps.classList.add("pulse")
                setTimeout(() => kps.classList.remove("pulse"), 50)

                // Rain (Trail) Animation
                const rain = document.createElement("div")
                rain.classList.add("rain", `${typeClass}-rain`)
                i.append(rain)

                let up = 0
                const rainInterval = setInterval(() => {
                    if (up < 400) {
                        up += 4
                        rain.style.height = `${up}px`
                    }
                }, 4)

                // Click Visual (Bottom Bar)
                const cl = document.createElement("div")
                cl.classList.add("cl", `cl-${typeClass}`)
                clickview.append(cl)

                let clX = 0
                const clInter = setInterval(() => {
                    clX += 3
                    if (clX >= 800) {
                        cl.remove()
                        clearInterval(clInter)
                    }
                    cl.style.transform = `translateX(-${clX}px)`
                }, 4)

                // Handle Key Up for this specific key
                const abort = new AbortController()
                if (ev.get(i)) ev.get(i).abort()
                ev.set(i, abort)

                window.addEventListener("keyup", (upEvent) => {
                    if (upEvent.key.toLowerCase() === i.innerText.toLowerCase()) {
                        i.classList.remove("active")
                        clearInterval(rainInterval)

                        let fadeOut = 0
                        const fadeInterval = setInterval(() => {
                            fadeOut += 5
                            if (fadeOut >= 400) {
                                rain.remove()
                                clearInterval(fadeInterval)
                            }
                            rain.style.transform = `translateY(-${fadeOut}px)`
                            rain.style.opacity = 1 - (fadeOut / 400)
                        }, 4)
                        abort.abort()
                    }
                }, { signal: abort.signal })

                // Accurate KPS Calculation using sliding window
                pressTimestamps.push(Date.now())
            })
        })

        // Update KPS display 60 times per second for smoothness
        setInterval(() => {
            const now = Date.now()
            // Filter out timestamps older than 1 second
            pressTimestamps = pressTimestamps.filter(t => now - t < 1000)
            kps.innerText = `KPS: ${pressTimestamps.length}`
        }, 16)

        // --- Metronome Logic ---
        let audioCtx = null;
        let metronomeInterval = null;
        let lastBeatTime = 0;
        let currentIntervalMs = 0;
        const bpmInput = document.getElementById('bpm-input');
        const volInput = document.getElementById('vol-input');
        const metronomeBtn = document.querySelector('.btn-metronome');

        function playDrumSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            lastBeatTime = Date.now();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const volume = parseFloat(volInput.value);

            osc.type = 'triangle'; // Triangle is punchier and louder
            // Metronome frequency drop (sharper click)
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);

            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);

            // Visual indicator for the "perfect" beat
            const cl = document.createElement("div");
            cl.classList.add("cl", "cl-perfect");
            clickview.append(cl);

            let clX = 0;
            const clInter = setInterval(() => {
                clX += 3;
                if (clX >= 800) {
                    cl.remove();
                    clearInterval(clInter);
                }
                cl.style.transform = `translateX(-${clX}px)`;
            }, 4);
        }

        metronomeBtn.onclick = () => {
            if (metronomeInterval) {
                // Stop
                clearInterval(metronomeInterval);
                metronomeInterval = null;
                metronomeBtn.innerText = '开启节拍器 / Start Metronome';
                metronomeBtn.classList.remove('active');
            } else {
                // Start
                const bpm = parseInt(bpmInput.value) || 120;
                const intervalMs = 60000 / bpm;
                
                // Initialize audio on user interaction
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                playDrumSound(); // Play first beat immediately
                metronomeInterval = setInterval(playDrumSound, intervalMs);
                
                metronomeBtn.innerText = '停止节拍器 / Stop Metronome';
                metronomeBtn.classList.add('active');
            }
        };
    </script>
</body>

</html>
